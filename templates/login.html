{% extends "base.html" %}
{% block title %}Login · Team Task Manager{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Login</h1>
                {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                <form method="post" action="/login">
                    <div class="mb-3">
                        <label class="form-label" for="username_or_email">Username or Email</label>
                        <input class="form-control" id="username_or_email" name="username_or_email" value="{{ username_or_email or '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" id="password" name="password" type="password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Login</button>
                </form>
                <p class="mt-3 mb-0 text-center">No account? <a href="/signup">Create one</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

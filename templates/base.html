<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Team Task Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --navy: #0f172a;
            --navy-soft: #1e293b;
            --page: #f5f7fb;
            --muted: #64748b;
            --line: #e2e8f0;
            --primary: #2563eb;
            --radius: 14px;
        }

        body {
            background: var(--page);
            color: #172033;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .app-shell {
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 280px;
            flex: 0 0 280px;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--navy), #111827);
            color: #fff;
            position: sticky;
            top: 0;
            align-self: flex-start;
            padding: 1.25rem;
            box-shadow: 10px 0 30px rgba(15, 23, 42, 0.12);
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            background: rgba(37, 99, 235, 0.22);
            color: #93c5fd;
            font-size: 1.3rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #cbd5e1;
            text-decoration: none;
            padding: 0.8rem 0.9rem;
            border-radius: 12px;
            margin-bottom: 0.35rem;
            transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateX(2px);
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            margin-top: 2rem;
            padding-top: 1rem;
        }

        .main-panel {
            flex: 1;
            min-width: 0;
            padding: 2rem;
        }

        .page-title {
            font-weight: 750;
            letter-spacing: 0;
        }

        .soft-card {
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: var(--radius);
            background: #fff;
            box-shadow: 0 14px 35px rgba(15, 23, 42, 0.07);
        }

        .stat-card {
            position: relative;
            overflow: hidden;
        }

        .stat-icon {
            width: 46px;
            height: 46px;
            display: grid;
            place-items: center;
            border-radius: 14px;
            font-size: 1.35rem;
        }

        .stat-blue { background: #dbeafe; color: #1d4ed8; }
        .stat-red { background: #fee2e2; color: #b91c1c; }
        .stat-yellow { background: #fef3c7; color: #b45309; }
        .stat-green { background: #dcfce7; color: #15803d; }
        .stat-dark { background: #e2e8f0; color: #0f172a; }

        .status-badge {
            border-radius: 999px;
            font-weight: 700;
            padding: 0.45rem 0.7rem;
            font-size: 0.75rem;
            letter-spacing: 0.01em;
        }

        .status-todo { background: #fee2e2; color: #991b1b; }
        .status-in-progress { background: #fef3c7; color: #92400e; }
        .status-done { background: #dcfce7; color: #166534; }
        .status-overdue { background: #111827; color: #fff; }

        .table-modern thead th {
            background: #f8fafc;
            color: #475569;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid var(--line);
        }

        .table-modern td,
        .table-modern th {
            padding: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.2);
        }

        .form-control,
        .form-select {
            border-radius: 11px;
            border-color: #dbe3ef;
        }

        .auth-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background:
                radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.22), transparent 28%),
                linear-gradient(135deg, #0f172a 0%, #1d4ed8 55%, #38bdf8 100%);
        }

        .auth-panel {
            width: min(1040px, 100%);
            overflow: hidden;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.35);
        }

        .auth-hero {
            min-height: 100%;
            padding: 3rem;
            color: #fff;
            background:
                linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(37, 99, 235, 0.82)),
                linear-gradient(45deg, #0f172a, #2563eb);
        }

        .auth-hero h1 {
            font-weight: 800;
            letter-spacing: 0;
        }

        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, minmax(240px, 1fr));
            gap: 1rem;
            align-items: start;
        }

        .kanban-column {
            border-radius: var(--radius);
            background: #f8fafc;
            border: 1px solid var(--line);
            padding: 1rem;
            min-height: 320px;
        }

        .kanban-task {
            border: 1px solid #e5edf7;
            border-radius: 13px;
            background: #fff;
            padding: 1rem;
            margin-bottom: 0.85rem;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
        }

        @media (max-width: 991.98px) {
            .app-shell {
                display: block;
            }

            .sidebar {
                position: static;
                width: 100%;
                min-height: auto;
                padding: 1rem;
            }

            .sidebar-nav {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0.5rem;
            }

            .sidebar-link {
                justify-content: center;
                margin-bottom: 0;
            }

            .sidebar-link span {
                display: none;
            }

            .main-panel {
                padding: 1rem;
            }

            .kanban-board {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
{% if current_user %}
<div class="app-shell">
    <aside class="sidebar">
        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="brand-mark"><i class="bi bi-kanban"></i></div>
            <div>
                <div class="fw-bold fs-5">Team Tasks</div>
                <div class="small text-white-50">Work management</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="sidebar-link" href="/dashboard"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
            <a class="sidebar-link" href="/projects"><i class="bi bi-folder2-open"></i><span>Projects</span></a>
            <a class="sidebar-link" href="/tasks"><i class="bi bi-check2-square"></i><span>Tasks</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="d-flex align-items-center gap-3 mb-3">
                <div class="brand-mark bg-white bg-opacity-10 text-white">{{ current_user.username[:1]|upper }}</div>
                <div class="min-w-0">
                    <div class="fw-semibold text-truncate">{{ current_user.username }}</div>
                    <div class="small text-white-50">{{ current_user.role|title }}</div>
                </div>
            </div>
            <form method="post" action="/logout">
                <button class="btn btn-outline-light w-100" type="submit"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
            </form>
        </div>
    </aside>
    <main class="main-panel">
{% else %}
<main class="auth-shell">
{% endif %}
        {% block content %}{% endblock %}
{% if current_user %}
    </main>
</div>
{% else %}
</main>
{% endif %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

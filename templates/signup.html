{% extends "base.html" %}
{% block title %}Signup · Team Task Manager{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Create Account</h1>
                {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                <form method="post" action="/signup">
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <input class="form-control" id="username" name="username" value="{{ form.username if form else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-control" id="email" name="email" type="email" value="{{ form.email if form else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-control" id="password" name="password" type="password" minlength="6" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="role">Role</label>
                        <select class="form-select" id="role" name="role">
                            <option value="member" {% if not form or form.role == "member" %}selected{% endif %}>Member</option>
                            <option value="admin" {% if form and form.role == "admin" %}selected{% endif %}>Admin</option>
                        </select>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Sign Up</button>
                </form>
                <p class="mt-3 mb-0 text-center">Already have an account? <a href="/login">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
